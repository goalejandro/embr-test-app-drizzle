platform: nodejs
platformVersion: "20"
autoDeploy: true

run:
  port: 3000
  startCommand: node server.js

dependencies:
  - name: db
    type: postgres
    required: true
    provides:
      - name: DATABASE_URL
        secret: true
    database:
      migrate: "npx drizzle-kit migrate"
      seed: "node db/seed.js"
